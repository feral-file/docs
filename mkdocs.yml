site_name: Feral File Docs
site_url: https://docs.feralfile.com
repo_url: https://github.com/feral-file/docs
theme:
  name: material

extra_javascript:
  - https://unpkg.com/mermaid@10.6.1/dist/mermaid.min.js

extra_css:
  - https://unpkg.com/mermaid@10.6.1/dist/mermaid.min.css
plugins:
  - search
  - redirects:
      redirect_maps:
        # Renamed 2026-05-13 (FF1 -> Art Computer / ff1-cli -> ff-cli).
        # Keep these old paths working for inbound links from search results,
        # partner docs, and previous Substack posts.
        ff1/index.md: art-computer/index.md
        ff1/specification.md: art-computer/specification.md
        ff1/how-it-works/life-cycle.md: art-computer/how-it-works/life-cycle.md
        ff1/how-it-works/display.md: art-computer/how-it-works/display.md
        ff1/how-it-works/ota.md: art-computer/how-it-works/ota.md
        ff1/how-it-works/send-playlists-to-ff1.md: art-computer/how-it-works/send-playlists-to-art-computer.md
        dp1-protocol/ff1-integration.md: dp1-protocol/art-computer-integration.md
        dp1-protocol/validator.md: dp1-protocol/dp1-cli.md

nav:
  - Home: index.md
  - ff-cli:
    - Start Here: api-reference/cli.md
  - Art Computer:
    - Getting Started: art-computer/index.md
    - How It Works:
      - Life Cycle: art-computer/how-it-works/life-cycle.md
      - End-to-End Architecture: art-computer/how-it-works/display.md
      - Send Playlists to the Art Computer: art-computer/how-it-works/send-playlists-to-art-computer.md
      - OTA: art-computer/how-it-works/ota.md
    - Specification: art-computer/specification.md
  - Exhibitions & Archive:
    - Exhibition Structure: exhibitions-n-archive/exhibition-structure.md
    - Modeling Artworks: exhibitions-n-archive/modeling-work.md
    - Token Metadata: exhibitions-n-archive/token-metadata.md
    - Smart Contracts: exhibitions-n-archive/smart-contracts.md
    - Data Endpoints: exhibitions-n-archive/data-endpoints.md
  - Artwork Library (JavaScript):
    - Install & Basics: artwork-lib/install-basics.md
    - Event Listeners: artwork-lib/event-listeners.md
  - DP-1 Protocol:
    - Start Here (Integrators): dp1-protocol/overview.md
    - DP-1 CLI (public beta): dp1-protocol/dp1-cli.md
    - Schemas: dp1-protocol/schemas.md
    - Feed Server:
      - Hosted Feed (Feral File): dp1-protocol/feed-server.md
      - Run your own Feed Server: dp1-protocol/self-hosted-feed.md
    - Art Computer Playback Bridge: dp1-protocol/art-computer-integration.md
    - Player Behavior: dp1-protocol/player-behavior.md
  - API Reference:
    - Command API: api-reference/command-api.md
    - Webhooks: api-reference/webhooks.md
  - LLM & Agents:
    - Quickstart: llm-agents/quickstart.md
  - Architecture:
    - Overview: bands/overview.md
  - Changelog: changelog.md
  - Contribute: contribute.md
  - FAQ: faq.md

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed
